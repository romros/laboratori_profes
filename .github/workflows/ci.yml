name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Mateix camí que validació local: servei frontend-check (Node 22 al contenidor)
      - name: Lint, typecheck, test, build (Docker)
        run: docker compose run --rm frontend-check sh -c "npm ci && npm run lint && npm run typecheck && npm run test && npm run build"
